name: CI — API (Spring Boot)

on:
  push:
    branches: [main, develop]
    paths:
      - "api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "api/**"

defaults:
  run:
    working-directory: api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sabia_test
          POSTGRES_USER: sabia
          POSTGRES_PASSWORD: sabia
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Verify mvnw permissions
        run: chmod +x ./mvnw

      - name: Build & Test
        run: ./mvnw verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/sabia_test
          SPRING_DATASOURCE_USERNAME: sabia
          SPRING_DATASOURCE_PASSWORD: sabia
          SPRING_PROFILES_ACTIVE: test