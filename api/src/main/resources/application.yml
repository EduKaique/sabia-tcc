spring:
  application:
    name: sabia-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sabia}
    username: ${DB_USER:sabia}
    password: ${DB_PASS:sabia}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080
  error:
    include-message: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

sabia:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-in-production-must-be-at-least-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:28800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
