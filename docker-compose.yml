services:
  db:
    image: postgres:16-alpine
    container_name: sabia_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sabia
      POSTGRES_USER: sabia
      POSTGRES_PASSWORD: sabia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sabia"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: sabia_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sabia
      SPRING_DATASOURCE_USERNAME: sabia
      SPRING_DATASOURCE_PASSWORD: sabia
      SPRING_PROFILES_ACTIVE: dev
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      target: dev
    container_name: sabia_web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  postgres_data:
